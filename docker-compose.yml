services:
  jcms:
    build: .
    image: jcms:0.1.0
    container_name: jcms
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/app.db
    volumes:
      - jcms-data:/app/data
      - jcms-uploads:/app/uploads
    expose:
      - "3000"
    networks:
      - npm_default
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 768M

networks:
  npm_default:
    external: true

volumes:
  jcms-data:
  jcms-uploads:
