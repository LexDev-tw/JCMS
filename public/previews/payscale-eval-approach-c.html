<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俸表 × 職務評定 — 方案 C 預覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '"Noto Sans TC"', 'PingFang TC', 'Microsoft JhengHei', 'sans-serif'],
                    },
                    colors: {
                        surface: '#FFFFFF',
                        panel: '#F7F7F5',
                        ink: { 900: '#111111', 600: '#666666', 400: '#999999', 100: '#EAEAEA' },
                        accent: '#F05A28',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="../css/jcms.css">
    <style>
        .preview-badge {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #f05a28;
            border: 1px solid rgba(240, 90, 40, 0.35);
            padding: 0.15rem 0.4rem;
            border-radius: 0.125rem;
        }
        .combo-chart-host { min-height: 15rem; }
        .combo-legend {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem 1rem;
        }
        .combo-legend__item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 10px;
            color: #666;
        }
        .combo-legend__swatch {
            width: 0.55rem;
            height: 0.55rem;
            border-radius: 9999px;
            flex-shrink: 0;
        }
        .combo-legend__swatch--line { background: #111; border-radius: 0; width: 0.75rem; height: 2px; }
        .combo-legend__swatch--a { background: #111; }
        .combo-legend__swatch--b { background: #666; }
        .combo-legend__swatch--c { background: #f05a28; }
        .combo-legend__swatch--promo { background: #f05a28; box-shadow: 0 0 0 2px #fff, 0 0 0 3px #f05a28; }
        .year-chip {
            font-size: 10px;
            font-weight: 700;
            font-family: ui-monospace, monospace;
            letter-spacing: 0.04em;
            padding: 0.18rem 0.45rem;
            border-radius: 0.125rem;
            border: 1px solid #eaeaea;
            background: #fff;
            color: #666;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .year-chip:hover { border-color: #111; color: #111; }
        .year-chip--active { border-color: #111; background: #111; color: #fff; }
        .year-chip--promo:not(.year-chip--active) { border-color: rgba(240, 90, 40, 0.45); color: #111; }
        .eval-detail-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
            gap: 0.75rem 1.25rem;
            align-items: start;
        }
        @media (max-width: 720px) {
            .eval-detail-panel { grid-template-columns: 1fr; }
        }
        .eval-result-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 0.1rem 0.35rem;
            border-radius: 0.125rem;
        }
        .eval-result-badge--a { color: #111; background: rgba(17, 17, 17, 0.08); }
        .eval-result-badge--b { color: #666; background: rgba(102, 102, 102, 0.1); }
        .eval-result-badge--c { color: #f05a28; background: rgba(240, 90, 40, 0.1); }
        .eval-promo-arrow { color: #f05a28; font-weight: 700; }
        .eval-detail-kv {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem 1.25rem;
            align-items: baseline;
        }
        .eval-detail-kv dt {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #111;
        }
        .eval-detail-kv dd {
            font-size: 11px;
            margin: 0;
        }
    </style>
</head>
<body class="bg-panel text-ink-900 font-sans antialiased overflow-hidden h-screen flex flex-col">
    <header class="h-14 bg-surface border-b border-ink-100 flex items-center px-6 sm:px-8 shrink-0">
        <div class="font-bold text-xl tracking-tight text-ink-900">JCMS<span class="text-accent font-bold text-xs ml-2">預覽</span></div>
        <div class="ml-auto flex items-center gap-2">
            <span class="preview-badge">方案 C · Mock</span>
            <span class="text-ink-400 text-lg" title="個人行政"><i class="ph ph-identification-card"></i></span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-surface min-w-0">
        <div class="max-w-[min(100%,92rem)] mx-auto w-full min-w-0 px-4 sm:px-8 lg:px-12 pt-4 sm:pt-5 pb-20 flex flex-col gap-4">
            <nav class="flex gap-1 sm:gap-4 overflow-x-auto pb-1 shrink-0" aria-label="個人行政分頁">
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-400 border-b-2 border-transparent whitespace-nowrap">差勤</button>
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-400 border-b-2 border-transparent whitespace-nowrap">薪資</button>
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-900 border-b-2 border-ink-900 -mb-px whitespace-nowrap" aria-current="page">俸表</button>
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-400 border-b-2 border-transparent whitespace-nowrap">研習</button>
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-400 border-b-2 border-transparent whitespace-nowrap">職務年表</button>
                <button type="button" class="shrink-0 px-2 sm:px-1 py-2 text-[13px] sm:text-[14px] font-bold tracking-widest text-ink-400 border-b-2 border-transparent whitespace-nowrap">行事／待辦</button>
            </nav>

            <div class="flex flex-col gap-3 w-full min-w-0">
                <!-- 主圖表區 -->
                <section class="flex flex-col gap-2 min-w-0" aria-labelledby="combo-chart-heading">
                    <div class="flex flex-wrap items-baseline justify-between gap-2">
                        <h1 id="combo-chart-heading" class="text-[12px] font-bold text-ink-900 uppercase tracking-widest">俸級與職務評定</h1>
                        <span class="text-[10px] font-mono tabular-nums text-ink-600">
                            現任俸級 <span class="font-bold text-accent" id="current-grade">16</span>
                            <span class="mx-1">·</span>
                            點擊圖表或下方年度切換明細
                        </span>
                    </div>

                    <div class="combo-chart-host w-full min-w-0 px-0.5">
                        <canvas id="comboChart" aria-label="俸級與職務評定組合圖"></canvas>
                    </div>

                    <div class="combo-legend" aria-hidden="true">
                        <span class="combo-legend__item"><span class="combo-legend__swatch combo-legend__swatch--line"></span>俸級走勢</span>
                        <span class="combo-legend__item"><span class="combo-legend__swatch combo-legend__swatch--a"></span>甲等</span>
                        <span class="combo-legend__item"><span class="combo-legend__swatch combo-legend__swatch--b"></span>乙等</span>
                        <span class="combo-legend__item"><span class="combo-legend__swatch combo-legend__swatch--c"></span>丙等</span>
                        <span class="combo-legend__item"><span class="combo-legend__swatch combo-legend__swatch--promo"></span>晉級</span>
                    </div>
                </section>

                <!-- 年度快速切換 -->
                <section class="flex flex-wrap items-center gap-2 min-w-0" aria-label="評定年度">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-ink-400 shrink-0">年度</span>
                    <div class="flex flex-wrap gap-1.5" id="year-chips"></div>
                    <button type="button" class="swiss-btn swiss-btn--primary ml-auto shrink-0" id="btn-add-eval">
                        <i class="ph ph-plus" aria-hidden="true"></i>新增評定
                    </button>
                </section>

                <!-- 選中年度明細（圖表點選後顯示） -->
                <section class="flex flex-col gap-2 min-w-0 pt-1 border-t border-ink-100" aria-labelledby="eval-detail-heading" id="detail-section">
                    <h2 id="eval-detail-heading" class="text-[12px] font-bold text-ink-900 uppercase tracking-widest">
                        <span id="detail-year-title">民國 114 年</span>
                        <span class="text-ink-400 font-normal normal-case tracking-normal text-[11px] ml-1">評定明細</span>
                    </h2>

                    <div id="detail-view" class="eval-detail-panel">
                        <dl class="eval-detail-kv m-0 p-0">
                            <div class="flex flex-col gap-0.5">
                                <dt>評定結果</dt>
                                <dd id="detail-result"></dd>
                            </div>
                            <div class="flex flex-col gap-0.5">
                                <dt>俸級</dt>
                                <dd id="detail-grade" class="font-mono tabular-nums text-ink-900"></dd>
                            </div>
                            <div class="flex flex-col gap-0.5">
                                <dt>生效日期</dt>
                                <dd id="detail-effective" class="font-mono tabular-nums text-ink-900"></dd>
                            </div>
                        </dl>

                        <div class="flex flex-col gap-0.5 min-w-0">
                            <span class="swiss-field-label">職務評定通知書</span>
                            <div class="training-attach-row min-w-0 flex flex-wrap items-center gap-2">
                                <div id="detail-attach" class="flex-1 min-w-0"></div>
                                <button type="button" class="swiss-btn swiss-btn--secondary shrink-0">選擇檔案</button>
                            </div>
                            <div class="w-full border border-dashed border-ink-100 bg-surface/95 rounded-sm px-4 py-3 text-center">
                                <p class="text-[10px] text-ink-600">拖曳 PDF／影像至此上傳</p>
                            </div>
                        </div>
                    </div>

                    <!-- 新增評定表單（預覽用） -->
                    <div id="detail-new" class="eval-detail-panel hidden" hidden>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 items-end min-w-0">
                            <div class="flex flex-col gap-0.5 min-w-0">
                                <label class="swiss-field-label" for="new-year">評定年度</label>
                                <input id="new-year" type="text" class="swiss-input font-mono tabular-nums" value="115" />
                            </div>
                            <div class="flex flex-col gap-0.5 min-w-0">
                                <label class="swiss-field-label" for="new-result">評定結果</label>
                                <select id="new-result" class="swiss-select">
                                    <option>甲等</option>
                                    <option selected>乙等</option>
                                    <option>丙等</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-0.5 min-w-0">
                                <label class="swiss-field-label" for="new-grade">晉級後俸級</label>
                                <input id="new-grade" type="number" min="1" max="24" class="swiss-input font-mono tabular-nums" value="16" />
                            </div>
                            <div class="flex flex-col gap-0.5 min-w-0">
                                <label class="swiss-field-label" for="new-eff">生效日期</label>
                                <input id="new-eff" type="text" class="swiss-input font-mono tabular-nums" value="" />
                            </div>
                        </div>
                        <div class="flex flex-wrap justify-end gap-2 col-span-full pt-1 border-t border-ink-100">
                            <button type="button" class="swiss-btn swiss-btn--ghost" id="btn-cancel-new">取消</button>
                            <button type="button" class="swiss-btn swiss-btn--primary">儲存</button>
                        </div>
                    </div>
                </section>

                <!-- 俸表明細（既有，收合示意） -->
                <section class="flex flex-col gap-2 min-w-0 pt-1 border-t border-ink-100 opacity-50" aria-labelledby="payscale-stub">
                    <h2 id="payscale-stub" class="text-[12px] font-bold text-ink-900 uppercase tracking-widest">俸表明細</h2>
                    <p class="text-[10px] text-ink-400 font-mono uppercase tracking-widest">（既有區塊 · 方案 C 以圖表為主，明細收合或次要）</p>
                </section>
            </div>
        </div>
    </main>

    <script>
        const SAMPLE_EVALS = [
            { id: 'e110', yearRoc3: '110', result: '乙', gradeFrom: 18, gradeTo: 18, effective: '1110101', hasAttach: false },
            { id: 'e111', yearRoc3: '111', result: '甲', gradeFrom: 18, gradeTo: 17, effective: '1120101', hasAttach: true, fileName: '111職務評定通知書.pdf' },
            { id: 'e112', yearRoc3: '112', result: '乙', gradeFrom: 17, gradeTo: 17, effective: '1130101', hasAttach: false },
            { id: 'e113', yearRoc3: '113', result: '甲', gradeFrom: 17, gradeTo: 16, effective: '1140101', hasAttach: true, fileName: '113職務評定通知書.pdf' },
            { id: 'e114', yearRoc3: '114', result: '乙', gradeFrom: 16, gradeTo: 16, effective: '1150101', hasAttach: true, fileName: '114職務評定通知書.pdf' },
        ];

        const RESULT_LABEL = { 甲: '甲等', 乙: '乙等', 丙: '丙等' };
        const RESULT_CLASS = { 甲: 'eval-result-badge--a', 乙: 'eval-result-badge--b', 丙: 'eval-result-badge--c' };
        const RESULT_BAR = { 甲: 3, 乙: 2, 丙: 1 };
        const RESULT_COLOR = { 甲: 'rgba(17,17,17,0.18)', 乙: 'rgba(102,102,102,0.22)', 丙: 'rgba(240,90,40,0.22)' };

        let selectedIndex = SAMPLE_EVALS.length - 1;
        let showNewForm = false;
        let comboChart = null;

        function formatRoc7(s) {
            const d = String(s || '').replace(/\D/g, '');
            if (d.length !== 7) return s || '—';
            return `${d.slice(0, 3)}/${d.slice(3, 5)}/${d.slice(5, 7)}`;
        }

        function gradeHtml(from, to) {
            if (from === to) return String(from);
            return `${from}<span class="eval-promo-arrow mx-0.5">→</span><span class="font-bold text-accent">${to}</span>`;
        }

        function sortedEvals() {
            return [...SAMPLE_EVALS].sort((a, b) => Number(a.yearRoc3) - Number(b.yearRoc3));
        }

        function renderYearChips() {
            const wrap = document.getElementById('year-chips');
            const sorted = sortedEvals();
            wrap.innerHTML = sorted.map((e, idx) => {
                const promo = e.gradeFrom !== e.gradeTo;
                const active = !showNewForm && idx === selectedIndex;
                return `<button type="button" class="year-chip font-mono tabular-nums ${active ? 'year-chip--active' : ''} ${promo ? 'year-chip--promo' : ''}" data-idx="${idx}">${e.yearRoc3}</button>`;
            }).join('');
            wrap.querySelectorAll('.year-chip').forEach((btn) => {
                btn.addEventListener('click', () => {
                    showNewForm = false;
                    selectedIndex = Number(btn.dataset.idx);
                    renderDetail();
                    renderYearChips();
                    if (comboChart) comboChart.update('none');
                });
            });
        }

        function renderDetail() {
            const view = document.getElementById('detail-view');
            const newForm = document.getElementById('detail-new');
            if (showNewForm) {
                view.hidden = true;
                view.classList.add('hidden');
                newForm.hidden = false;
                newForm.classList.remove('hidden');
                document.getElementById('detail-year-title').textContent = '新增評定';
                return;
            }
            view.hidden = false;
            view.classList.remove('hidden');
            newForm.hidden = true;
            newForm.classList.add('hidden');

            const sorted = sortedEvals();
            const e = sorted[selectedIndex];
            document.getElementById('detail-year-title').textContent = `民國 ${e.yearRoc3} 年`;
            document.getElementById('detail-result').innerHTML = `<span class="eval-result-badge ${RESULT_CLASS[e.result]}">${RESULT_LABEL[e.result]}</span>`;
            document.getElementById('detail-grade').innerHTML = gradeHtml(e.gradeFrom, e.gradeTo);
            document.getElementById('detail-effective').textContent = formatRoc7(e.effective);
            document.getElementById('current-grade').textContent = String(sorted[sorted.length - 1].gradeTo);

            const attachEl = document.getElementById('detail-attach');
            if (e.hasAttach) {
                attachEl.innerHTML = `<ul class="training-attach-chips m-0 p-0 list-none flex flex-wrap items-center gap-1 min-w-0">
                    <li class="training-attach-chip min-w-0">
                        <a href="#" class="training-attach-chip__link" onclick="return false">
                            <i class="ph ph-file-pdf text-accent shrink-0" aria-hidden="true"></i>
                            <span class="truncate">${e.fileName}</span>
                        </a>
                    </li>
                </ul>`;
            } else {
                attachEl.innerHTML = '<span class="text-[10px] text-ink-600">尚未上傳</span>';
            }
        }

        function createResultLabelsPlugin(sorted) {
            return {
                id: 'evalResultLabels',
                afterDatasetsDraw(chart) {
                    const meta = chart.getDatasetMeta(1);
                    const ctx = chart.ctx;
                    ctx.save();
                    ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    meta.data.forEach((bar, idx) => {
                        if (!bar || bar.skip) return;
                        const e = sorted[idx];
                        const isSelected = !showNewForm && idx === selectedIndex;
                        ctx.fillStyle = isSelected ? '#111111' : '#999999';
                        ctx.fillText(e.result, bar.x, bar.y - 4);
                    });
                    ctx.restore();
                },
            };
        }

        function createSelectionHighlightPlugin(sorted) {
            return {
                id: 'evalSelectionHighlight',
                beforeDatasetsDraw(chart) {
                    if (showNewForm) return;
                    const meta = chart.getDatasetMeta(0);
                    const el = meta.data[selectedIndex];
                    if (!el) return;
                    const ctx = chart.ctx;
                    const { top, bottom } = chart.chartArea;
                    ctx.save();
                    ctx.fillStyle = 'rgba(247, 247, 245, 0.85)';
                    ctx.fillRect(el.x - 18, top, 36, bottom - top);
                    ctx.restore();
                },
            };
        }

        function initComboChart() {
            const sorted = sortedEvals();
            const grades = sorted.map((e) => e.gradeTo);
            const minG = Math.min(...grades) - 1;
            const maxG = Math.max(...grades) + 1;

            comboChart = new Chart(document.getElementById('comboChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map((e) => `民國${e.yearRoc3}`),
                    datasets: [
                        {
                            type: 'line',
                            label: '俸級',
                            data: grades,
                            yAxisID: 'yGrade',
                            borderColor: '#111111',
                            borderWidth: 2,
                            stepped: true,
                            pointBackgroundColor: sorted.map((e) => (e.gradeFrom !== e.gradeTo ? '#F05A28' : '#111111')),
                            pointBorderColor: sorted.map((e) => (e.gradeFrom !== e.gradeTo ? '#F05A28' : '#111111')),
                            pointRadius: sorted.map((_, idx) => (idx === selectedIndex && !showNewForm ? 7 : 5)),
                            pointHoverRadius: 7,
                            fill: false,
                            order: 1,
                        },
                        {
                            type: 'bar',
                            label: '評定',
                            data: sorted.map((e) => RESULT_BAR[e.result]),
                            yAxisID: 'yResult',
                            backgroundColor: sorted.map((e) => RESULT_COLOR[e.result]),
                            borderWidth: 0,
                            barThickness: 22,
                            borderRadius: 2,
                            order: 2,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    onClick(_evt, elements) {
                        if (!elements.length) return;
                        const idx = elements[0].index;
                        showNewForm = false;
                        selectedIndex = idx;
                        renderDetail();
                        renderYearChips();
                        comboChart.update('none');
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title(items) {
                                    const e = sorted[items[0].dataIndex];
                                    return `民國 ${e.yearRoc3} 年`;
                                },
                                label(ctx) {
                                    const e = sorted[ctx.dataIndex];
                                    if (ctx.dataset.type === 'line' || ctx.dataset.label === '俸級') {
                                        const promo = e.gradeFrom !== e.gradeTo;
                                        return promo
                                            ? `俸級 ${e.gradeFrom} → ${e.gradeTo}`
                                            : `俸級 ${e.gradeTo}`;
                                    }
                                    return `評定：${RESULT_LABEL[e.result]}`;
                                },
                            },
                            titleFont: { family: 'ui-monospace', weight: '700' },
                            bodyFont: { family: 'ui-monospace' },
                        },
                    },
                    scales: {
                        yGrade: {
                            position: 'left',
                            reverse: true,
                            min: minG,
                            max: maxG,
                            ticks: {
                                font: { family: 'ui-monospace', size: 10 },
                                color: '#666666',
                                callback: (v) => `級 ${v}`,
                            },
                            grid: { color: 'rgba(234, 234, 234, 0.95)' },
                            title: { display: true, text: '俸級', font: { size: 9, weight: '700' }, color: '#999999' },
                        },
                        yResult: {
                            display: false,
                            min: 0,
                            max: 4,
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10 }, color: '#666666' },
                        },
                    },
                },
                plugins: [
                    createSelectionHighlightPlugin(sorted),
                    createResultLabelsPlugin(sorted),
                ],
            });
        }

        document.getElementById('btn-add-eval').addEventListener('click', () => {
            showNewForm = !showNewForm;
            document.getElementById('btn-add-eval').innerHTML = showNewForm
                ? '收合新增'
                : '<i class="ph ph-plus" aria-hidden="true"></i>新增評定';
            renderDetail();
            renderYearChips();
            if (comboChart) comboChart.update('none');
        });

        document.getElementById('btn-cancel-new').addEventListener('click', () => {
            showNewForm = false;
            document.getElementById('btn-add-eval').innerHTML = '<i class="ph ph-plus" aria-hidden="true"></i>新增評定';
            renderDetail();
            renderYearChips();
            if (comboChart) comboChart.update('none');
        });

        renderDetail();
        renderYearChips();
        initComboChart();
    </script>
</body>
</html>
